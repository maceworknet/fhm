title: Site Settings
tabs:
  main:
    display: Genel
    sections:
      -
        display: Marka
        fields:
          -
            handle: company_name
            field:
              type: text
              display: Şirket Adı
          -
            handle: company_tagline
            field:
              type: text
              display: Kısa Tanım
          -
            handle: company_summary
            field:
              type: textarea
              display: Genel Açıklama
          -
            handle: footer_summary
            field:
              type: textarea
              display: Footer Açıklaması
