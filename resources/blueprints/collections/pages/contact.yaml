title: Contact
tabs:
  main:
    display: İçerik
    sections:
      -
        display: Hero
        fields:
          -
            handle: hero_kicker
            field:
              type: text
              display: Hero Etiketi
          -
            handle: hero_title
            field:
              type: text
              display: Hero Başlığı
          -
            handle: hero_text
            field:
              type: textarea
              display: Hero Açıklaması
      -
        display: İletişim Notu
        fields:
          -
            handle: contact_note_title
            field:
              type: text
              display: Bilgi Kartı Başlığı
          -
            handle: contact_note_text
            field:
              type: textarea
              display: Bilgi Kartı Açıklaması
          -
            handle: content
            field:
              type: markdown
              display: Sayfa İçeriği
      -
        display: İletişim Bilgileri (Kartlar)
        fields:
          -
            handle: contact_info_eyebrow
            field:
              type: text
              display: Kartlar Üst Etiketi (Eyebrow)
              default: "İletişim Bilgileri"
          -
            handle: contact_info_title
            field:
              type: text
              display: Kartlar Başlığı
              default: "Dogrudan erisilebilir, sade iletisim akisi"
          -
            handle: contact_info_text
            field:
              type: textarea
              display: Kartlar Açıklaması
              default: "Teklif, kesif ve revizyon talepleriniz icin temel proje basliklariyla bize ulasmaniz yeterli. Ilk gorusmede kapsam, lokasyon ve dogru baslangic adimlarini hizlica netlestiriyoruz."
          -
            handle: phones
            field:
              type: grid
              display: Telefon Numaraları
              fields:
                -
                  handle: phone_display
                  field:
                    type: text
                    display: Telefon Metni
                -
                  handle: phone_link
                  field:
                    type: text
                    display: Telefon Linki
          -
            handle: emails
            field:
              type: grid
              display: E-posta Adresleri
              fields:
                -
                  handle: email
                  field:
                    type: text
                    display: E-posta Metni
                -
                  handle: email_link
                  field:
                    type: text
                    display: E-posta Linki
          -
            handle: addresses
            field:
              type: grid
              display: Adresler
              fields:
                -
                  handle: address
                  field:
                    type: textarea
                    display: Adres Metni
          -
            handle: working_hours_list
            field:
              type: grid
              display: Çalışma Saatleri
              fields:
                -
                  handle: working_hours
                  field:
                    type: text
                    display: Çalışma Saati Metni

  sidebar:
    display: Ayarlar
    sections:
      -
        fields:
          -
            handle: template
            field:
              type: template
              display: Template
              default: contact
