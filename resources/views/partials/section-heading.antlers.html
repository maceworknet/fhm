<div class="section-heading" data-reveal>
    <div class="space-y-3">
        {{ if eyebrow }}
            <span class="eyebrow">{{ eyebrow }}</span>
        {{ /if }}
        <h2 class="section-title">{{ title }}</h2>
    </div>
    {{ if text }}
        <p class="section-copy">{{ text }}</p>
    {{ /if }}
</div>
