<article class="card-surface service-card" data-reveal>
    <div class="space-y-4">
        <span class="card-tag">Hizmet</span>
        <h3 class="card-title">{{ title }}</h3>
        <p class="card-copy">{{ hero_text }}</p>
    </div>
    <div class="flex items-center justify-between gap-4">
        <span class="text-xs font-semibold uppercase tracking-[0.18em] text-slate-400">Teknik uygulama</span>
        <a href="{{ url }}" class="inline-link">Detayları İncele</a>
    </div>
</article>
